<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>天气</title>
<link rel="stylesheet" href="../../shared/base.css">
<style>
  body { width: 185px; }
  .widget { height: 100vh; display: flex; flex-direction: column; position: relative; }
  .widget::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--weather-gradient, none);
    border-radius: inherit;
    pointer-events: none;
    z-index: 0;
    transition: background 0.6s ease;
  }
  .titlebar, .weather-body { position: relative; z-index: 1; }
  .weather-body { padding: 4px 14px 14px; -webkit-app-region: no-drag; flex: 1; }
  .weather-main { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .weather-icon { font-size: 36px; line-height: 1; }
  .weather-temp { font-size: 32px; font-weight: 300; line-height: 1; }
  .weather-city { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .weather-desc { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
  .weather-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 8px 0; }
  .weather-details { display: grid; grid-template-columns: 1fr; gap: 5px; }
  .detail-item { display: flex; align-items: center; gap: 5px; }
  .detail-icon { font-size: 12px; flex-shrink: 0; }
  .detail-label { font-size: 10px; color: var(--text-tertiary); flex: 1; }
  .detail-value { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .loading { font-size: 12px; color: var(--text-tertiary); padding: 8px 0; }
  .error { font-size: 11px; color: var(--color-red); padding: 4px 0; }
</style>
</head>
<body>
<div class="widget" id="widgetEl">
  <div class="titlebar">
    <span class="titlebar-title">🌤️ 天气</span>
    <button class="btn-pin" id="btnPin" onclick="togglePin()" title="固定在最上层">📌</button>
    <div class="opacity-slider-wrap" title="调节透明度">
      <span class="opacity-icon">◐</span>
      <input class="opacity-slider" id="opacitySlider" type="range" min="0.15" max="1" step="0.01" value="0.72">
    </div>
    <div class="titlebar-dots">
      <button class="dot close" onclick="window.api.closeWindow()" title="关闭"></button>
      <button class="dot min"   onclick="window.api.minimizeWindow()" title="最小化"></button>
      <button class="dot max"   onclick="toggleOpacitySlider()" title="透明度"></button>
    </div>
  </div>
  <div class="weather-body" id="weatherBody"><div class="loading">加载中...</div></div>
</div>
<script src="../../shared/widget.js"></script>
<script>
const CITY = 'Shenzhen'

function getGradient(descEn) {
  if (descEn.includes('sunny') || descEn.includes('clear')) {
    return 'linear-gradient(160deg, rgba(253,224,139,0.18), rgba(186,230,253,0.15))'
  } else if (descEn.includes('snow') || descEn.includes('blizzard')) {
    return 'linear-gradient(160deg, rgba(186,230,253,0.18), rgba(224,242,254,0.15))'
  } else if (descEn.includes('rain') || descEn.includes('drizzle') || descEn.includes('thunder')) {
    return 'linear-gradient(160deg, rgba(148,163,184,0.18), rgba(203,213,225,0.12))'
  } else if (descEn.includes('cloud') || descEn.includes('overcast') || descEn.includes('fog') || descEn.includes('mist')) {
    return 'linear-gradient(160deg, rgba(203,213,225,0.15), rgba(226,232,240,0.12))'
  }
  return null
}

async function fetchWeather() {
  try {
    const res = await fetch(`https://wttr.in/${encodeURIComponent(CITY)}?format=j1`)
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const json = await res.json()
    const cur = json.current_condition[0]
    const temp = cur.temp_C, feelsLike = cur.FeelsLikeC
    const humidity = cur.humidity, wind = cur.windspeedKmph, uv = cur.uvIndex
    const desc = cur.lang_zh?.[0]?.value || cur.weatherDesc[0].value
    const descEn = cur.weatherDesc[0].value.toLowerCase()
    let icon = '\uD83C\uDF24\uFE0F'
    if (descEn.includes('sunny') || descEn.includes('clear')) icon = '\u2600\uFE0F'
    else if (descEn.includes('overcast')) icon = '\u2601\uFE0F'
    else if (descEn.includes('partly cloudy')) icon = '\u26C5'
    else if (descEn.includes('cloud')) icon = '\uD83C\uDF25\uFE0F'
    else if (descEn.includes('thunder')) icon = '\u26C8\uFE0F'
    else if (descEn.includes('heavy rain') || descEn.includes('torrential')) icon = '\uD83C\uDF27\uFE0F'
    else if (descEn.includes('rain') || descEn.includes('drizzle')) icon = '\uD83C\uDF26\uFE0F'
    else if (descEn.includes('snow') || descEn.includes('blizzard')) icon = '\u2744\uFE0F'
    else if (descEn.includes('fog') || descEn.includes('mist')) icon = '\uD83C\uDF2B\uFE0F'

    const gradient = getGradient(descEn)
    const widget = document.getElementById('widgetEl')
    widget.style.setProperty('--weather-gradient', gradient || 'none')

    document.getElementById('weatherBody').innerHTML = `
      <div class="weather-main"><div class="weather-icon">${icon}</div><div class="weather-temp">${temp}\u00B0</div></div>
      <div class="weather-city">\u6DF1\u5733</div>
      <div class="weather-desc">${desc}</div>
      <div class="weather-divider"></div>
      <div class="weather-details">
        <div class="detail-item"><span class="detail-icon">\uD83C\uDF21</span><span class="detail-label">\u4F53\u611F</span><span class="detail-value">${feelsLike}\u00B0</span></div>
        <div class="detail-item"><span class="detail-icon">\uD83D\uDCA7</span><span class="detail-label">\u6E7F\u5EA6</span><span class="detail-value">${humidity}%</span></div>
        <div class="detail-item"><span class="detail-icon">\uD83D\uDCA8</span><span class="detail-label">\u98CE\u901F</span><span class="detail-value">${wind}km/h</span></div>
        <div class="detail-item"><span class="detail-icon">\u2600\uFE0F</span><span class="detail-label">\u7D2B\u5916\u7EBF</span><span class="detail-value">${uv}</span></div>
      </div>`
  } catch {
    document.getElementById('widgetEl').style.setProperty('--weather-gradient', 'none')
    document.getElementById('weatherBody').innerHTML = `
      <div class="weather-main"><div class="weather-icon">\uD83C\uDF24\uFE0F</div><div class="weather-temp">--\u00B0</div></div>
      <div class="weather-city">\u6DF1\u5733</div><div class="error">\u7F51\u7EDC\u9519\u8BEF\uFF0C\u7A0D\u540E\u91CD\u8BD5</div>`
  }
}
fetchWeather()
setInterval(fetchWeather, 10 * 60 * 1000)
</script>
</body>
</html>

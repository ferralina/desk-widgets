<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>便签</title>
<link rel="stylesheet" href="../../shared/base.css">
<style>
  body { width: 190px; min-height: 175px; }

  .widget {
    height: 100vh;
    display: flex;
    flex-direction: column;
    /* 书页黄色，完全不透明，不用毛玻璃 */
    background:
      repeating-linear-gradient(
        transparent 0px,
        transparent 25px,
        rgba(150, 120, 30, 0.28) 25px,
        rgba(150, 120, 30, 0.28) 26px
      ),
      rgba(252, 240, 148, var(--widget-alpha)) !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    border: 1px solid rgba(180, 150, 40, 0.35) !important;
    box-shadow: 2px 3px 10px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,200,0.5) !important;
  }

  .titlebar {
    padding: 8px 10px 6px;
    border-bottom: 1px solid rgba(160, 130, 40, 0.2);
    background: rgba(248, 230, 100, 0.4);
  }

  .sticky-body {
    flex: 1;
    padding: 6px 12px 12px;
    -webkit-app-region: no-drag;
  }

  .sticky-text {
    width: 100%;
    height: 100%;
    min-height: 110px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-size: 13px;
    font-family: var(--font);
    color: rgba(60, 40, 0, 0.82);
    line-height: 26px;
    padding-top: 4px;
    caret-color: rgba(180, 100, 0, 0.8);
  }

  .sticky-text::placeholder {
    color: rgba(140, 110, 30, 0.45);
  }
</style>
</head>
<body>
<div class="widget">
  <div class="titlebar">
    <span class="titlebar-title">📝 便签</span>
    <button class="btn-pin" id="btnPin" onclick="togglePin()" title="固定在最上层">📌</button>
    <div class="opacity-slider-wrap" title="调节透明度">
      <span class="opacity-icon">◐</span>
      <input class="opacity-slider" id="opacitySlider" type="range" min="0.15" max="1" step="0.01" value="0.72">
    </div>
    <div class="titlebar-dots">
      <button class="dot close" onclick="window.api.closeWindow()" title="关闭"></button>
      <button class="dot min"   onclick="window.api.minimizeWindow()" title="最小化"></button>
      <button class="dot max"   onclick="toggleOpacitySlider()" title="透明度"></button>
    </div>
  </div>
  <div class="sticky-body">
    <textarea class="sticky-text" id="stickyText" placeholder="写点什么..."></textarea>
  </div>
</div>
<script src="../../shared/widget.js"></script>
<script>
let data = null, timer = null
async function load() {
  data = await window.api.getData()
  document.getElementById('stickyText').value = data.sticky || ''
}
document.getElementById('stickyText').addEventListener('input', async (e) => {
  clearTimeout(timer)
  timer = setTimeout(async () => {
    if (!data) return
    data.sticky = e.target.value
    await window.api.saveData(data)
  }, 600)
})
load()
</script>
</body>
</html>
